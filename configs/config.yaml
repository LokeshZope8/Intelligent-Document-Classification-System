data_ingestion:
  dataset_name: "ag_news"
  raw_data_dir: "data/raw"
  interim_data_dir: "data/interim"
  processed_data_dir: "data/processed"

data_validation:
  required_columns:
    - text
    - label

ocr:
  tesseract_path: "C:/Program Files/Tesseract-OCR/tesseract.exe"
  extracted_text_dir: data/interim

feature_engineering:
  max_features: 10000
  ngram_range: [1,2]

data_transformation:

  processed_data_dir: data/processed
  vectorizer_dir: data/processed
  max_features: 10000
  ngram_range: [1,2]

model_trainer:
  model_dir: artifacts/models
  metrics_dir: artifacts/metrics
  models:
    - naive_bayes
    - logistic_regression
    - svm

model_evaluation:
  metric: "accuracy"
  target_score: 0.95

prediction:
  confidence_threshold: 0.6